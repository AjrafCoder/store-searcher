name: scrape

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - run: pip install -r requirements-dev.txt
      - run: pytest -q

  run:
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Restore scrape cache
        uses: actions/cache@v4
        with:
          path: data/cache.sqlite
          key: arb-cache-${{ github.run_id }}
          restore-keys: arb-cache-

      - name: Run scrape
        id: scrape
        run: python run.py
        continue-on-error: true

      - name: Commit data
        run: |
          git config user.name  "arbitrage-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/deals.json data/unmatched.json || true
          if git diff --cached --quiet; then
            echo "no changes"
          else
            git commit -m "[bot] refresh deals.json"
            git push
          fi

      - name: Open issue on failure
        if: steps.scrape.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const title = `[bot] scrape failed on ${new Date().toISOString().slice(0,10)}`;
            const body = `Scraper run failed in workflow ${context.runId}.\n\nLogs: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner, repo: context.repo.repo, state: 'open', labels: 'scraper-failure'
            });
            if (existing.data.some(i => i.title === title)) return;
            await github.rest.issues.create({
              owner: context.repo.owner, repo: context.repo.repo,
              title, body, labels: ['scraper-failure']
            });
